<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch The Box</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="game-wrapper">
        <h1 id="gameTitle">🎯 Catch The Box</h1>

        <div class="player-box" id="startPanel">
            <input type="text" id="playerName" placeholder="Enter your name" autocomplete="off">
            <button id="startBtn">Start Game</button>
        </div>

        <div class="end-stats" id="endStats">
            <input type="text" id="finalPlayerName" readonly>
            <input type="text" id="finalScoreBox" readonly>
        </div>

        <div class="info" id="gameInfo">
            <div class="score-box">
                Score: <span id="score">0</span>
            </div>

            <div class="time-box">
                Time: <span id="time">20</span>
            </div>
        </div>

        <div class="container" id="gameArea">
            <div class="box"></div>
        </div>

        <h2 id="leaderboardTitle">🏆 Leaderboard</h2>

        <table id="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button id="restart">Play Again</button>
    </main>

    <script src="script.js"></script>
</body>

</html>
